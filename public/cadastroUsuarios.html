<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="d-flex justify-content-center py-3">
      <ul class="nav nav-pills">
        <li class="nav-item">
          <a href="./index.html" class="nav-link active" aria-current="page">Inicio</a>
        </li>
        <li class="nav-item">
          <a href="./cadastroUsuarios.html" class="nav-link">Cadastro de Usuarios</a>
        </li>
        <li class="nav-item">
          <a href="./cadastroTarefas.html" class="nav-link">Cadastro de Tarefas</a>
        </li>
        <li class="nav-item">
          <a href="./gerenciamentoTarefas.html" class="nav-link">Gerenciar Tarefas</a>
        </li>
      </ul>
    </header>


    <form id="formCadastro">
        <h1 class="h3 mb-3 fw-normal">Cadastro de Usuários</h1>
      
        <div class="form-floating mb-3">
          <input id="nome"
            type="text"
            class="form-control"
            id="floatingName"
            placeholder="Seu nome"
          />
          <label for="floatingName">Nome</label>
        </div>
      
        <div class="form-floating mb-3">
          <input id="email"
            type="email"
            class="form-control"
            id="floatingEmail"
            placeholder="name@example.com"
          />
          <label for="floatingEmail">Email</label>
        </div>
      
        <button class="btn btn-primary w-100 py-2" type="submit">
          Cadastrar
        </button>
      </form>

      <p id="mensagem"></p>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="cadastroUsuarios.js"></script>

  </body>
</html>
